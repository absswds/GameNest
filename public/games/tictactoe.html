<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>井字棋</title>
<link rel="stylesheet" href="/style.css">
<style>
  .ttt-cell.taken { cursor: default; }
  .win-cell { background: rgba(124, 111, 247, 0.35) !important; }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }
  .overlay-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 32px 28px;
    text-align: center;
    max-width: 300px;
    width: 90%;
  }
  .overlay-card .result { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .overlay-card .sub { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
</style>
</head>
<body>
  <div style="width:100%;max-width:420px;display:flex;align-items:center;justify-content:space-between">
    <button class="back-btn" onclick="location.href='/'">← 大厅</button>
    <div class="room-id-badge" id="roomBadge">---</div>
  </div>

  <div class="player-bar">
    <div class="player-tag p1 active" id="p1Tag"><span class="dot"></span><span id="p1Name">你</span></div>
    <span class="vs-text">VS</span>
    <div class="player-tag p2" id="p2Tag"><span class="dot"></span><span id="p2Name">---</span></div>
  </div>

  <div class="game-status" id="status">等待对手加入...</div>

  <div class="board-wrap">
    <div class="ttt-grid" id="board">
      <button class="ttt-cell" data-cell="0"></button>
      <button class="ttt-cell" data-cell="1"></button>
      <button class="ttt-cell" data-cell="2"></button>
      <button class="ttt-cell" data-cell="3"></button>
      <button class="ttt-cell" data-cell="4"></button>
      <button class="ttt-cell" data-cell="5"></button>
      <button class="ttt-cell" data-cell="6"></button>
      <button class="ttt-cell" data-cell="7"></button>
      <button class="ttt-cell" data-cell="8"></button>
    </div>
  </div>

  <div class="game-actions">
    <button class="btn btn-outline" id="restartBtn">重新开始</button>
  </div>

  <div class="overlay" id="overlay" style="display:none">
    <div class="overlay-card">
      <div class="result" id="resultText"></div>
      <div class="sub" id="resultSub"></div>
      <button class="btn btn-primary" onclick="doRestart()">再来一局</button>
    </div>
  </div>

<script>
const WIN_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

const roomId = sessionStorage.getItem('roomId');
const playerIndex = parseInt(sessionStorage.getItem('playerIndex'));
const symbols = ['X', 'O'];

let ws = null;
let state = null;
let currentPlayer = null;
let winner = null;
let players = [];
let reconnectTimer = null;

document.getElementById('roomBadge').textContent = roomId;

function connect() {
  if (ws) { try { ws.close(); } catch(e) {} }
  ws = new WebSocket(`ws://${location.host}`);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join_room', data: { roomId } }));
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
  ws.onclose = () => {
    reconnectTimer = setTimeout(connect, 1500);
  };
  ws.onerror = () => {};
}

function handleMessage(msg) {
  if (msg.type === 'room_joined' || msg.type === 'game_state') {
    state = msg.state || state;
    currentPlayer = state?.currentPlayer;
    winner = state?.winner;
    players = msg.players || players;
    updatePlayerBar();
    renderBoard();
  }
  if (msg.type === 'player_joined' || msg.type === 'player_left') {
    players = msg.players || players;
    if (msg.state) {
      state = msg.state;
      currentPlayer = state.currentPlayer;
      winner = state.winner;
    }
    updatePlayerBar();
    if (msg.type === 'player_left') {
      document.getElementById('status').textContent = '对手离开了，等待中...';
      document.getElementById('overlay').style.display = 'none';
    }
    renderBoard();
  }
  if (msg.type === 'game_started') {
    state = msg.state;
    currentPlayer = state.currentPlayer;
    winner = state.winner;
    players = msg.players;
    updatePlayerBar();
    renderBoard();
    document.getElementById('status').textContent = '';
  }
  if (msg.type === 'error') {
    document.getElementById('status').textContent = msg.message;
  }
}

function updatePlayerBar() {
  const me = players.find(p => p.index === playerIndex);
  const other = players.find(p => p.index !== playerIndex);
  document.getElementById('p1Name').textContent = me ? (me.index === 0 ? '你（X）' : '你（O）') : '你';
  document.getElementById('p2Name').textContent = other ? (other.index === 0 ? '对手（X）' : '对手（O）') : '等待中...';

  document.getElementById('p1Tag').classList.toggle('active', currentPlayer === 0);
  document.getElementById('p2Tag').classList.toggle('active', currentPlayer === 1);

  if (players.length < 2) {
    document.getElementById('status').textContent = '等待对手加入...';
    document.getElementById('status').className = 'game-status';
  }
}

function renderBoard() {
  if (!state) return;
  const cells = document.querySelectorAll('.ttt-cell');
  cells.forEach(c => {
    const v = state.board[parseInt(c.dataset.cell)];
    c.textContent = v === 0 ? 'X' : v === 1 ? 'O' : '';
    c.className = 'ttt-cell';
    if (v === 0) c.classList.add('p1');
    if (v === 1) c.classList.add('p2');
    if (v !== null) c.classList.add('taken');
  });

  if (winner !== null && winner !== undefined) {
    showResult();
  }

  if (currentPlayer === playerIndex && players.length === 2 && winner === null) {
    document.getElementById('status').textContent = '轮到你了';
    document.getElementById('status').className = 'game-status';
  } else if (currentPlayer !== playerIndex && players.length === 2 && winner === null) {
    document.getElementById('status').textContent = '对手回合';
    document.getElementById('status').className = 'game-status';
  }
}

function showResult() {
  let txt, sub;
  if (winner === -1) {
    txt = '平局！'; sub = '不分胜负';
    document.getElementById('status').className = 'game-status draw';
    document.getElementById('status').textContent = '平局';
  } else {
    const isMe = winner === playerIndex;
    txt = isMe ? '你赢了！' : '你输了';
    sub = isMe ? '漂亮的一局！' : '下次加油。';
    document.getElementById('status').className = 'game-status winner';
    document.getElementById('status').textContent = isMe ? '你赢了！' : '对手赢了';
  }
  document.getElementById('resultText').textContent = txt;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('overlay').style.display = 'flex';

  if (winner >= 0) {
    for (const [a,b,c] of WIN_LINES) {
      if (state.board[a] === winner && state.board[a] === state.board[b] && state.board[b] === state.board[c]) {
        document.querySelector(`[data-cell="${a}"]`).classList.add('win-cell');
        document.querySelector(`[data-cell="${b}"]`).classList.add('win-cell');
        document.querySelector(`[data-cell="${c}"]`).classList.add('win-cell');
        break;
      }
    }
  }
}

document.querySelectorAll('.ttt-cell').forEach(cell => {
  cell.addEventListener('click', () => {
    const idx = parseInt(cell.dataset.cell);
    if (state && state.board[idx] !== null) return;
    if (currentPlayer !== playerIndex) return;
    if (players.length < 2) return;
    if (winner !== null) return;
    ws.send(JSON.stringify({ type: 'game_move', data: { cell: idx } }));
  });
});

function doRestart() {
  document.getElementById('overlay').style.display = 'none';
  ws.send(JSON.stringify({ type: 'game_restart' }));
}

document.getElementById('restartBtn').addEventListener('click', doRestart);

connect();
</script>
</body>
</html>
