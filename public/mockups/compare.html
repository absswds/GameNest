<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计对比</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
h1 { text-align: center; margin-bottom: 30px; font-size: 24px; }
.options { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
iframe { width: 380px; height: 750px; border: none; border-radius: 20px; background: #000; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.label { text-align: center; font-size: 15px; font-weight: 700; margin-bottom: 10px; padding: 6px 16px; border-radius: 20px; display: inline-block; }
.option-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.label-a { background: #0ff2; color: #0ff; }
.label-b { background: #ff02; color: #ff0; }
.label-c { background: #fff1; color: #ddd; }
</style>
</head>
<body>
<h1>三种设计方案对比</h1>
<div class="options">
  <div class="option-wrap">
    <span class="label label-a">A · 赛博游戏厅</span>
    <iframe src="/mockups/design-a.html"></iframe>
  </div>
  <div class="option-wrap">
    <span class="label label-b">B · 温馨桌游夜</span>
    <iframe src="/mockups/design-b.html"></iframe>
  </div>
  <div class="option-wrap">
    <span class="label label-c">C · 极简轻奢</span>
    <iframe src="/mockups/design-c.html"></iframe>
  </div>
</div>
</body>
</html>
