<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>联机桌游</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="lobby-page">
  <main class="lobby-shell">
    <section class="lobby-hero">
      <div class="hero-copy">
        <p class="eyebrow">LAN TABLETOP</p>
        <h1 class="hero-title">联机桌游</h1>
        <p class="hero-subtitle">同一 Wi-Fi 下，选一个游戏，几秒开房，直接开玩。</p>
      </div>
      <div class="hero-stats">
        <div class="hero-stat">
          <strong>22</strong>
          <span>款游戏</span>
        </div>
        <div class="hero-stat">
          <strong>2-10</strong>
          <span>支持人数</span>
        </div>
        <div class="hero-stat">
          <strong>本地</strong>
          <span>局域网直连</span>
        </div>
      </div>
      <div class="hero-panels">
        <section class="hero-panel" id="resumeSection" style="display:none">
          <div class="panel-heading">继续对局</div>
          <button class="btn btn-primary" id="resumeBtn">返回进行中的对局</button>
        </section>
        <section class="hero-panel">
          <div class="panel-heading">加入房间</div>
          <div class="join-row">
            <input class="input" id="roomCodeInput" type="text" maxlength="4" placeholder="输入房间号" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
            <button class="btn btn-outline" id="joinBtn">加入</button>
          </div>
        </section>
      </div>
    </section>

    <p class="wifi-note">确保所有设备连接到同一个 Wi-Fi 或手机热点。</p>
    <div class="network-callout" id="networkCallout" hidden>
      <strong id="networkCalloutTitle"></strong>
      <p id="networkCalloutHint"></p>
      <div class="network-links" id="networkLinks"></div>
    </div>

    <section class="lobby-discovery">
      <div class="discovery-header">
        <div>
          <p class="eyebrow">精选推荐</p>
          <h2>先从这些局开始</h2>
        </div>
        <p class="discovery-hint">先选中，再点底部创建。再次点中同一张卡也会直接开房。</p>
      </div>
      <div class="featured-strip" id="featuredStrip"></div>
    </section>

    <section class="lobby-browser">
      <div class="browser-toolbar">
        <div>
          <p class="eyebrow">浏览全部</p>
          <h2>按风格找局</h2>
        </div>
        <div class="browser-tools">
          <input class="browser-search" id="gameSearch" type="search" placeholder="搜索游戏名、标签、类型">
          <div class="category-chips" id="categoryChips"></div>
        </div>
      </div>
      <div class="browse-grid" id="gameGrid"></div>
      <p class="browse-empty" id="emptyState" style="display:none">没有找到匹配的游戏，换个关键词试试。</p>
    </section>

  </main>

  <div class="toast" id="toast"></div>
  <button id="quickCreate" class="quick-create-btn">创建房间</button>

<script src="/js/game-catalog.js"></script>
<script>
let selectedGame = 'monopoly';
let activeCategory = '\u5168\u90e8';
let searchText = '';

const catalog = window.gameCatalog.list();
const featuredGames = window.gameCatalog.featured();

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getGameInfo(id) {
  return window.gameCatalog.byId(id) || {
    id: id,
    name: id,
    icon: '?',
    subtitle: '',
    description: '',
    players: '',
    duration: '',
    category: '',
    tags: [],
    cover: ''
  };
}

function getSocketURL() {
  const protocol = location.protocol === 'https:' ? 'wss://' : 'ws://';
  return protocol + location.host;
}

function buildCover(game, compact) {
  if (game.cover) {
    return '<img class="' + (compact ? 'featured-cover' : 'browse-cover') + '" src="' + game.cover + '" alt="' + escapeHtml(game.name) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
      '<div class="' + (compact ? 'featured-fallback' : 'browse-fallback') + '" style="display:none">' + escapeHtml(game.icon) + '</div>';
  }
  return '<div class="' + (compact ? 'featured-fallback' : 'browse-fallback') + '">' + escapeHtml(game.icon) + '</div>';
}

function buildFeaturedCard(game) {
  const selectedClass = game.id === selectedGame ? ' selected' : '';
  return '<button class="featured-card' + selectedClass + '" data-game="' + game.id + '">' +
    '<div class="featured-media">' + buildCover(game, true) + '</div>' +
    '<div class="featured-content">' +
      '<div class="featured-topline"><span>' + escapeHtml(game.category) + '</span><span>' + escapeHtml(game.players) + '</span></div>' +
      '<h3>' + escapeHtml(game.name) + '</h3>' +
      '<p>' + escapeHtml(game.subtitle) + '</p>' +
    '</div>' +
  '</button>';
}

function buildBrowseCard(game) {
  const selectedClass = game.id === selectedGame ? ' selected' : '';
  const ai = game.supportsAI ? '<span>\u53ef\u52a0 AI</span>' : '<span>\u7eaf PvP</span>';
  return '<button class="browse-card' + selectedClass + '" data-game="' + game.id + '">' +
    '<div class="browse-card-media">' + buildCover(game, false) + '</div>' +
    '<div class="browse-card-body">' +
      '<div class="browse-card-meta"><span>' + escapeHtml(game.category) + '</span><span>' + escapeHtml(game.duration) + '</span></div>' +
      '<h3>' + escapeHtml(game.name) + '</h3>' +
      '<p>' + escapeHtml(game.description) + '</p>' +
      '<div class="browse-card-footer"><span>' + escapeHtml(game.players) + '</span>' + ai + '</div>' +
    '</div>' +
  '</button>';
}

function updateQuickCreate() {
  const game = getGameInfo(selectedGame);
  document.getElementById('quickCreate').textContent = '\u521b\u5efa\u300a' + game.name + '\u300b\u623f\u95f4';
}

function renderNetworkInfo(info) {
  const callout = document.getElementById('networkCallout');
  const title = document.getElementById('networkCalloutTitle');
  const hint = document.getElementById('networkCalloutHint');
  const root = document.getElementById('networkLinks');
  if (!callout || !title || !hint || !root) return;

  const lanURLs = ((info && info.lanURLs) || []).map(function(item) {
    return item && item.url ? item.url : '';
  }).filter(Boolean);

  callout.hidden = false;

  if (!lanURLs.length) {
    title.textContent = '\u5f53\u524d\u7aef\u53e3\uff1a' + ((info && info.port) || location.port || '3000');
    hint.textContent = '\u624b\u673a\u9700\u8981\u548c\u7535\u8111\u5728\u540c\u4e00 Wi-Fi\uff0c\u5e76\u8bbf\u95ee\u7535\u8111\u7684\u5c40\u57df\u7f51 IP\uff0c\u4e0d\u8981\u7528 127.0.0.1\u3002';
    root.innerHTML = info && info.localURL
      ? '<span class="network-link muted">' + escapeHtml(info.localURL) + '</span>'
      : '';
    return;
  }

  title.textContent = '\u624b\u673a\u8bf7\u8bbf\u95ee\u4e0b\u9762\u4efb\u4e00\u5730\u5740';
  hint.textContent = '\u5982\u679c\u7535\u8111\u6d4f\u89c8\u5668\u91cc\u662f 127.0.0.1 \u6216 localhost\uff0c\u90a3\u53ea\u80fd\u7535\u8111\u81ea\u5df1\u7528\uff0c\u624b\u673a\u9700\u8981\u6539\u7528\u4e0b\u9762\u7684 Wi-Fi \u5c40\u57df\u7f51\u5730\u5740\u3002';
  root.innerHTML = lanURLs.map(function(url) {
    return '<span class="network-link">' + escapeHtml(url) + '</span>';
  }).join('');
}

function matches(game) {
  const haystack = [
    game.name,
    game.subtitle,
    game.description,
    game.category,
    (game.tags || []).join(' ')
  ].join(' ').toLowerCase();
  if (activeCategory !== '\u5168\u90e8' && game.category !== activeCategory) return false;
  if (!searchText) return true;
  return haystack.indexOf(searchText) >= 0;
}

function bindSelection(containerSelector) {
  document.querySelectorAll(containerSelector).forEach(function(card) {
    card.addEventListener('click', function() {
      const wasSelected = this.classList.contains('selected');
      selectedGame = this.dataset.game;
      renderCatalog();
      updateQuickCreate();
      if (wasSelected) createRoom();
    });
  });
}

function renderCategories() {
  const chips = ['\u5168\u90e8'].concat(window.gameCatalog.categories());
  const root = document.getElementById('categoryChips');
  root.innerHTML = chips.map(function(category) {
    const selectedClass = category === activeCategory ? ' selected' : '';
    return '<button class="category-chip' + selectedClass + '" data-category="' + escapeHtml(category) + '">' + escapeHtml(category) + '</button>';
  }).join('');
  root.querySelectorAll('.category-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      activeCategory = this.dataset.category;
      renderCatalog();
    });
  });
}

function renderCatalog() {
  document.getElementById('featuredStrip').innerHTML = featuredGames.map(buildFeaturedCard).join('');
  const filtered = catalog.filter(matches);
  document.getElementById('gameGrid').innerHTML = filtered.map(buildBrowseCard).join('');
  document.getElementById('emptyState').style.display = filtered.length ? 'none' : '';
  bindSelection('.featured-card');
  bindSelection('.browse-card');
  renderCategories();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function createRoom() {
  const ws = new WebSocket(getSocketURL());
  ws.onopen = function() {
    ws.send(JSON.stringify({ type: 'create_room', data: { game: selectedGame } }));
  };
  ws.onmessage = function(e) {
    const msg = JSON.parse(e.data);
    if (msg.type === 'room_created') {
      sessionStorage.setItem('roomId', msg.roomId);
      sessionStorage.setItem('playerIndex', msg.playerIndex);
      sessionStorage.setItem('game', msg.game);
      if (msg.resumeToken) sessionStorage.setItem('resumeToken', msg.resumeToken);
      ws.close();
      location.href = '/game.html';
    } else if (msg.type === 'error') {
      toast('\u9519\u8bef: ' + msg.message);
    }
  };
  ws.onerror = function() {
    toast('\u8fde\u63a5\u5931\u8d25\uff0c\u670d\u52a1\u5668\u662f\u5426\u5df2\u542f\u52a8\uff1f');
  };
}

document.getElementById('quickCreate').addEventListener('click', function() {
  createRoom();
});

document.getElementById('joinBtn').addEventListener('click', function() {
  const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
  if (!code) {
    toast('\u8bf7\u8f93\u5165\u623f\u95f4\u53f7');
    return;
  }
  const ws = new WebSocket(getSocketURL());
  ws.onopen = function() {
    ws.send(JSON.stringify({ type: 'join_room', data: { roomId: code } }));
  };
  ws.onmessage = function(e) {
    const msg = JSON.parse(e.data);
    if (msg.type === 'room_joined') {
      sessionStorage.setItem('roomId', msg.roomId);
      sessionStorage.setItem('playerIndex', msg.playerIndex);
      sessionStorage.setItem('game', msg.game);
      if (msg.resumeToken) sessionStorage.setItem('resumeToken', msg.resumeToken);
      ws.close();
      location.href = '/game.html';
    } else if (msg.type === 'error') {
      toast('\u9519\u8bef: ' + msg.message);
      if (msg.code === 'ROOM_NOT_FOUND') {
        sessionStorage.removeItem('roomId');
        sessionStorage.removeItem('playerIndex');
        sessionStorage.removeItem('game');
        sessionStorage.removeItem('resumeToken');
      }
    }
  };
  ws.onerror = function() {
    toast('\u8fde\u63a5\u5931\u8d25\uff0c\u670d\u52a1\u5668\u662f\u5426\u5df2\u542f\u52a8\uff1f');
  };
});

document.getElementById('roomCodeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    document.getElementById('joinBtn').click();
  }
});

document.getElementById('gameSearch').addEventListener('input', function() {
  searchText = this.value.trim().toLowerCase();
  renderCatalog();
});

if (sessionStorage.getItem('roomId') && sessionStorage.getItem('resumeToken')) {
  const savedGame = sessionStorage.getItem('game');
  const game = getGameInfo(savedGame);
  document.getElementById('resumeBtn').textContent = '\u7ee7\u7eed\u300a' + game.name + '\u300b \u623f\u95f4 ' + sessionStorage.getItem('roomId');
  document.getElementById('resumeSection').style.display = '';
  document.getElementById('resumeBtn').onclick = function() {
    location.href = '/game.html';
  };
}

(function() {
  const params = new URLSearchParams(location.search);
  if (params.get('roomExpired') === '1') {
    toast('\u623f\u95f4\u5df2\u5931\u6548\uff0c\u8bf7\u91cd\u65b0\u521b\u5efa\u6216\u8f93\u5165\u623f\u95f4\u53f7\u52a0\u5165\u3002');
    history.replaceState(null, '', location.pathname);
  }
  const roomCode = params.get('room');
  if (!roomCode) return;
  document.getElementById('roomCodeInput').value = roomCode.trim().toUpperCase();
  document.getElementById('joinBtn').click();
})();

renderCatalog();
updateQuickCreate();
fetch('/network-info')
  .then(function(response) {
    if (!response.ok) throw new Error('network');
    return response.json();
  })
  .then(renderNetworkInfo)
  .catch(function() {
    renderNetworkInfo(null);
  });
</script>
</body>
</html>
